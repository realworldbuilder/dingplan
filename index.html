<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DingPlan — Free Construction Scheduling</title>
    <meta name="description" content="Free open-source construction scheduling for subcontractors. The P6 killer for the little guy.">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta property="og:title" content="DingPlan — Free Construction Scheduling">
    <meta property="og:description" content="Free open-source P6 alternative. Gantt charts, CPM, XER import/export. No login required.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 260px;
        z-index: 1;
        pointer-events: auto;
      }
      #left-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100%;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="left-panel"></div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/index.js"></script>
  </body>
