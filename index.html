<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DingPlan — Free Construction Scheduling</title>
    <meta name="description" content="Free open-source construction scheduling for subcontractors. The P6 killer for the little guy.">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta property="og:title" content="DingPlan — Free Construction Scheduling">
    <meta property="og:description" content="Free open-source P6 alternative. Gantt charts, CPM, XER import/export. No login required.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: auto;
        transition: left 0.3s ease, width 0.3s ease;
      }
      canvas.panel-open {
        left: 260px;
      }
      #left-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100%;
        z-index: 100;
      }
      #left-panel-toggle {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 99;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s, left 0.3s ease;
      }
      #left-panel-toggle:hover {
        background: #f3f4f6;
      }
      #left-panel-toggle img {
        height: 24px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <button id="left-panel-toggle" title="Toggle Menu"><img src="/logo.png" alt="Menu"></button>
    <div id="left-panel"></div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
