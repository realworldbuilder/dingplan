<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DingPlan — Free Construction Scheduling</title>
    <meta name="description" content="Free open-source construction scheduling for subcontractors. The P6 killer for the little guy.">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta property="og:title" content="DingPlan — Free Construction Scheduling">
    <meta property="og:description" content="Free open-source P6 alternative. Gantt charts, CPM, XER import/export. No login required.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: auto;
        transition: left 0.3s ease, width 0.3s ease;
      }
      canvas.panel-open {
        left: 260px;
      }
      #left-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100%;
        z-index: 100;
      }
      #left-panel-toggle {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 200;
        height: 44px;
        padding: 0 14px;
        border: none;
        border-radius: 10px;
        background: #1a1a1a;
        color: white;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease, left 0.3s ease;
      }
      #left-panel-toggle:hover {
        background: #333;
        transform: scale(1.02);
      }
      #left-panel-toggle img {
        height: 22px;
        object-fit: contain;
      }
      #left-panel-toggle .menu-icon {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <button id="left-panel-toggle" title="Toggle Menu"><span class="menu-icon">☰</span> DingPlan</button>
    <div id="left-panel"></div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
