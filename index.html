<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DingPlan — Free Construction Scheduling</title>
    <meta name="description" content="Free open-source construction scheduling for subcontractors. The P6 killer for the little guy.">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta property="og:title" content="DingPlan — Free Construction Scheduling">
    <meta property="og:description" content="Free open-source P6 alternative. Gantt charts, CPM, XER import/export. No login required.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
        position: absolute;
        top: 48px;
        left: 0;
        height: calc(100vh - 48px);
        z-index: 1;
        pointer-events: auto;
        transition: left 0.3s ease, width 0.3s ease;
      }
      canvas.panel-open {
        left: 260px;
      }
      #left-panel {
        position: fixed;
        top: 48px;
        left: 0;
        width: 260px;
        height: calc(100% - 48px);
        z-index: 100;
        pointer-events: none;
      }
      #left-panel > * {
        pointer-events: auto;
      }
      #left-panel-toggle:hover {
        background: #e5e7eb;
      }
      
      /* Auth Modal Styles */
      #auth-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      
      #auth-modal.show {
        display: flex;
      }
      
      .auth-content {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      
      .auth-header {
        text-align: center;
        margin-bottom: 24px;
      }
      
      .auth-header h2 {
        color: white;
        margin: 0 0 8px 0;
        font-size: 24px;
        font-weight: 600;
      }
      
      .auth-header p {
        color: #888;
        margin: 0;
        font-size: 14px;
      }
      
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      
      .auth-form input {
        padding: 12px 16px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #2a2a2a;
        color: white;
        font-size: 14px;
        font-family: inherit;
      }
      
      .auth-form input:focus {
        outline: none;
        border-color: #0066cc;
      }
      
      .auth-form input::placeholder {
        color: #666;
      }
      
      .auth-btn {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      
      .auth-btn-primary {
        background: #0066cc;
        color: white;
      }
      
      .auth-btn-primary:hover {
        background: #0056b3;
      }
      
      .auth-btn-secondary {
        background: #333;
        color: white;
      }
      
      .auth-btn-secondary:hover {
        background: #444;
      }
      
      .auth-btn-google {
        background: white;
        color: #333;
        border: 1px solid #ddd;
      }
      
      .auth-btn-google:hover {
        background: #f5f5f5;
      }
      
      .auth-divider {
        display: flex;
        align-items: center;
        margin: 16px 0;
        color: #666;
        font-size: 14px;
      }
      
      .auth-divider::before,
      .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #333;
      }
      
      .auth-divider span {
        padding: 0 16px;
      }
      
      .auth-toggle {
        text-align: center;
        margin-top: 16px;
        color: #888;
        font-size: 14px;
      }
      
      .auth-toggle button {
        background: none;
        border: none;
        color: #0066cc;
        cursor: pointer;
        text-decoration: underline;
        font-family: inherit;
      }
      
      .auth-error {
        background: #ff4444;
        color: white;
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
      }
      
      .auth-skip {
        text-align: center;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #333;
      }
      
      .auth-skip button {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
        font-family: inherit;
      }
      
      .auth-skip button:hover {
        color: #aaa;
      }
      
      /* Toolbar User Section */
      .toolbar-sign-in {
        background: #1a1a1a;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        transition: all 0.2s;
      }
      
      .toolbar-sign-in:hover {
        background: #333;
      }
      
      .toolbar-user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .toolbar-user-email {
        color: #374151;
        font-size: 14px;
        font-weight: 500;
      }
      
      .toolbar-sign-out {
        background: #f3f4f6;
        border: none;
        color: #374151;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }
      
      .toolbar-sign-out:hover {
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <!-- Top Toolbar -->
    <div id="top-toolbar" style="
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: white; border-bottom: 1px solid #e5e7eb; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    ">
      <!-- Left section -->
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="left-panel-toggle" title="Toggle Menu" style="
          height: 36px; padding: 0 12px; border: none; border-radius: 6px;
          background: #f3f4f6; color: #374151; cursor: pointer;
          display: flex; align-items: center; gap: 6px; font-family: inherit;
          font-size: 14px; font-weight: 500; transition: all 0.2s ease;
        ">
          <span class="menu-icon">☰</span>
        </button>
        <span id="project-name-display" style="
          color: #1a1a1a; font-size: 16px; font-weight: 600; 
          max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        ">My Project</span>
      </div>
      
      <!-- Right section -->
      <div id="toolbar-user-section">
        <!-- Will be populated by JavaScript based on auth state -->
      </div>
    </div>
    
    <div id="left-panel"></div>
    <canvas id="canvas" style="top: 48px; height: calc(100vh - 48px);"></canvas>
    
    <!-- Auth Modal -->
    <div id="auth-modal">
      <div class="auth-content">
        <div class="auth-header">
          <img src="/logo.png" alt="DingPlan" style="width: 80px; height: 80px; object-fit: contain; margin: 0 auto 16px; display: block;">
          <h2 id="auth-title">Save &amp; sync your schedules</h2>
          <p id="auth-subtitle">Access your projects from any device</p>
        </div>
        
        <div id="auth-error" class="auth-error" style="display: none;"></div>
        
        <button id="auth-google" class="auth-btn auth-btn-google" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 600; margin-bottom: 16px;">Sign in with Google</button>
        
        <div class="auth-divider">
          <span>or use email</span>
        </div>
        
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" placeholder="Email address" required>
          <input type="password" id="auth-password" placeholder="Password" required>
          <button type="submit" id="auth-submit" class="auth-btn auth-btn-secondary">Sign In with Email</button>
        </form>
        
        <div class="auth-toggle">
          <span id="auth-toggle-text">Don't have an account?</span>
          <button type="button" id="auth-toggle-btn">Sign up</button>
        </div>
        
        <div class="auth-skip">
          <button type="button" id="auth-skip-btn" style="
            background: none; border: none; color: #0066cc; cursor: pointer; 
            font-size: 16px; text-decoration: underline; font-family: inherit;
            font-weight: 500; padding: 8px;
          ">Continue without account</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
