<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DingPlan — Free Construction Scheduling</title>
    <meta name="description" content="Free open-source construction scheduling for subcontractors. The P6 killer for the little guy.">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta property="og:title" content="DingPlan — Free Construction Scheduling">
    <meta property="og:description" content="Free open-source P6 alternative. Gantt charts, CPM, XER import/export. No login required.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #0a1628 0%, #0d1b2a 100%);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #e2e8f0;
      }
      canvas {
        display: block;
        position: absolute;
        top: 48px;
        left: 0;
        height: calc(100vh - 48px);
        z-index: 1;
        pointer-events: auto;
        transition: left 0.3s ease, width 0.3s ease;
      }
      canvas.panel-open {
        left: 260px;
      }
      #left-panel {
        position: fixed;
        top: 48px;
        left: 0;
        width: 260px;
        height: calc(100% - 48px);
        z-index: 100;
        pointer-events: none;
      }
      #left-panel > * {
        pointer-events: auto;
      }
      #left-panel-toggle:hover {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(79, 209, 197, 0.2);
      }
      
      /* Auth Modal Styles */
      #auth-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(10, 22, 40, 0.85);
        backdrop-filter: blur(12px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      
      #auth-modal.show {
        display: flex;
      }
      
      .auth-content {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        backdrop-filter: blur(12px);
        padding: 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(10, 22, 40, 0.7), 0 0 40px rgba(79, 209, 197, 0.1);
      }
      
      .auth-header {
        text-align: center;
        margin-bottom: 24px;
      }
      
      .auth-header h2 {
        color: #e2e8f0;
        margin: 0 0 8px 0;
        font-size: 24px;
        font-weight: 600;
      }
      
      .auth-header p {
        color: #94a3b8;
        margin: 0;
        font-size: 14px;
      }
      
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      
      .auth-form input {
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: #e2e8f0;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      
      .auth-form input:focus {
        outline: none;
        border-color: #4fd1c5;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(79, 209, 197, 0.3);
      }
      
      .auth-form input::placeholder {
        color: #64748b;
      }
      
      .auth-btn {
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
        background: rgba(255, 255, 255, 0.04);
      }
      
      .auth-btn-primary {
        background: linear-gradient(135deg, #4fd1c5, #38b2ac);
        border: none;
        color: #0d1b2a;
      }
      
      .auth-btn-primary:hover {
        box-shadow: 0 0 25px rgba(79, 209, 197, 0.4);
        transform: translateY(-1px);
      }
      
      .auth-btn-secondary {
        background: rgba(255, 255, 255, 0.04);
        color: #e2e8f0;
      }
      
      .auth-btn-secondary:hover {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(79, 209, 197, 0.2);
      }
      
      .auth-btn-google {
        background: rgba(255, 255, 255, 0.95);
        color: #1a202c;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .auth-btn-google:hover {
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }
      
      .auth-divider {
        display: flex;
        align-items: center;
        margin: 16px 0;
        color: #94a3b8;
        font-size: 14px;
      }
      
      .auth-divider::before,
      .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
      }
      
      .auth-divider span {
        padding: 0 16px;
      }
      
      .auth-toggle {
        text-align: center;
        margin-top: 16px;
        color: #94a3b8;
        font-size: 14px;
      }
      
      .auth-toggle button {
        background: none;
        border: none;
        color: #4fd1c5;
        cursor: pointer;
        text-decoration: underline;
        font-family: inherit;
        transition: all 0.2s ease;
      }
      
      .auth-error {
        background: linear-gradient(135deg, #e53e3e, #c53030);
        color: #fef2f2;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        font-size: 14px;
        margin-bottom: 16px;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
      }
      
      .auth-skip {
        text-align: center;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      
      .auth-skip button {
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
        font-family: inherit;
        transition: all 0.2s ease;
      }
      
      .auth-skip button:hover {
        color: #4fd1c5;
      }
      
      /* Gen X Soft Club Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 3px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(79, 209, 197, 0.4);
        border-radius: 3px;
        transition: background 0.3s ease;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(79, 209, 197, 0.6);
      }
      
      /* Firefox scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(79, 209, 197, 0.4) rgba(255, 255, 255, 0.04);
      }
      
      /* Toolbar User Section */
      .toolbar-sign-in {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      
      .toolbar-sign-in:hover {
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 20px rgba(79, 209, 197, 0.3);
      }
      
      .toolbar-user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .toolbar-user-email {
        color: #e2e8f0;
        font-size: 14px;
        font-weight: 500;
      }
      
      .toolbar-sign-out {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #94a3b8;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      
      .toolbar-sign-out:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <!-- Top Toolbar -->
    <div id="top-toolbar" style="
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: rgba(255, 255, 255, 0.06); 
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79, 209, 197, 0.2); 
      box-shadow: 0 1px 20px rgba(79, 209, 197, 0.1);
      z-index: 1000;
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    ">
      <!-- Left section -->
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="left-panel-toggle" title="Toggle Menu" style="
          height: 36px; padding: 0 12px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
          background: rgba(255, 255, 255, 0.06); color: #e2e8f0; cursor: pointer;
          display: flex; align-items: center; gap: 6px; font-family: inherit;
          font-size: 14px; font-weight: 500; transition: all 0.3s ease;
        ">
          <span class="menu-icon">☰</span>
        </button>
        <span id="project-name-display" style="
          color: #e2e8f0; font-size: 16px; font-weight: 600; 
          max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        ">My Project</span>
      </div>
      
      <!-- Right section -->
      <div id="toolbar-user-section">
        <!-- Will be populated by JavaScript based on auth state -->
      </div>
    </div>
    
    <div id="left-panel"></div>
    <canvas id="canvas" style="top: 48px; height: calc(100vh - 48px);"></canvas>
    
    <!-- Auth Modal -->
    <div id="auth-modal">
      <div class="auth-content">
        <div class="auth-header">
          <img src="/logo.png" alt="DingPlan" style="width: 80px; height: 80px; object-fit: contain; margin: 0 auto 16px; display: block;">
          <h2 id="auth-title">Save &amp; sync your schedules</h2>
          <p id="auth-subtitle">Access your projects from any device</p>
        </div>
        
        <div id="auth-error" class="auth-error" style="display: none;"></div>
        
        <button id="auth-google" class="auth-btn auth-btn-google" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 600; margin-bottom: 16px;">Sign in with Google</button>
        
        <div class="auth-divider">
          <span>or use email</span>
        </div>
        
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" placeholder="Email address" required>
          <input type="password" id="auth-password" placeholder="Password" required>
          <button type="submit" id="auth-submit" class="auth-btn auth-btn-secondary">Sign In with Email</button>
        </form>
        
        <div class="auth-toggle">
          <span id="auth-toggle-text">Don't have an account?</span>
          <button type="button" id="auth-toggle-btn">Sign up</button>
        </div>
        
        <div class="auth-skip">
          <button type="button" id="auth-skip-btn" style="
            background: none; border: none; color: #4fd1c5; cursor: pointer; 
            font-size: 16px; text-decoration: underline; font-family: inherit;
            font-weight: 500; padding: 8px; transition: all 0.2s ease;
          ">Continue without account</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
